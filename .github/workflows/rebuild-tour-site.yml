name: Rebuild Tour Site from Sheets

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'astro.config.mjs'
      - 'package.json'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch and transform tour data from Sheets
        env:
          TOUR_SHEETS_ID: ${{ secrets.TOUR_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          TOUR_NAME: ${{ secrets.TOUR_NAME }}
          TOUR_SLUG: ${{ secrets.TOUR_SLUG }}
          TOUR_START_DATE: ${{ secrets.TOUR_START_DATE }}
          TOUR_END_DATE: ${{ secrets.TOUR_END_DATE }}
          TOUR_DESCRIPTION: ${{ secrets.TOUR_DESCRIPTION }}
          R2_BASE_URL: ${{ secrets.R2_BASE_URL }}
        run: npm run fetch

      - name: Build site with Astro
        env:
          TOUR_NAME: ${{ secrets.TOUR_NAME }}
          TOUR_SLUG: ${{ secrets.TOUR_SLUG }}
          TOUR_START_DATE: ${{ secrets.TOUR_START_DATE }}
          TOUR_END_DATE: ${{ secrets.TOUR_END_DATE }}
          TOUR_DESCRIPTION: ${{ secrets.TOUR_DESCRIPTION }}
          R2_BASE_URL: ${{ secrets.R2_BASE_URL }}
        run: npm run build:astro

      - name: Commit updated tour-data.json if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/data/tour-data.json
          git diff-index --quiet HEAD || git commit -m "Update tour data from Sheets"

      - name: Push changes back to repo
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
        run: |
          npm install -g wrangler
          wrangler pages deploy dist --project-name=$CLOUDFLARE_PROJECT_NAME
