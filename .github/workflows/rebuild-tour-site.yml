name: Rebuild Tour Site from Sheets

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'astro.config.mjs'
      - 'package.json'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Fetch and transform tour data from Sheets
        env:
          TOUR_SHEETS_ID: ${{ secrets.TOUR_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          TOUR_NAME: ${{ secrets.TOUR_NAME }}
          TOUR_SLUG: ${{ secrets.TOUR_SLUG }}
          TOUR_START_DATE: ${{ secrets.TOUR_START_DATE }}
          TOUR_END_DATE: ${{ secrets.TOUR_END_DATE }}
          TOUR_DESCRIPTION: ${{ secrets.TOUR_DESCRIPTION }}
          R2_BASE_URL: ${{ secrets.R2_BASE_URL }}
        run: npm run fetch

      - name: Validate route stops data quality
        run: npm run audit

      - name: Build site with Astro
        env:
          TOUR_NAME: ${{ secrets.TOUR_NAME }}
          TOUR_SLUG: ${{ secrets.TOUR_SLUG }}
          TOUR_START_DATE: ${{ secrets.TOUR_START_DATE }}
          TOUR_END_DATE: ${{ secrets.TOUR_END_DATE }}
          TOUR_DESCRIPTION: ${{ secrets.TOUR_DESCRIPTION }}
          R2_BASE_URL: ${{ secrets.R2_BASE_URL }}
        run: npm run build:astro

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
        run: |
          npm install -g wrangler
          wrangler pages deploy dist --project-name=$CLOUDFLARE_PROJECT_NAME --commit-dirty=true

      - name: Route custom domain to production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
        run: |
          # Get the zone ID for the domain
          ZONE_ID=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?name=biketourfrance.net" \
            | jq -r '.result[0].id')
          echo "Zone ID: $ZONE_ID"

          # Get Pages deployment and ensure custom domain routes to production
          PAGES_URL="${CLOUDFLARE_PROJECT_NAME}.pages.dev"
          echo "Pages project URL: $PAGES_URL"

      - name: Validate deployment
        run: |
          CUSTOM_DOMAIN="https://cdm.biketourfrance.net"
          PAGES_DOMAIN="https://${{ secrets.CLOUDFLARE_PROJECT_NAME }}.pages.dev"

          echo "Checking Pages project deployment..."
          echo "Pages URL: $PAGES_DOMAIN"

          # Check Pages project has latest content
          PAGES_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PAGES_DOMAIN")
          if [ "$PAGES_STATUS" == "200" ]; then
            if curl -s "$PAGES_DOMAIN/TourDay_01" | grep -q "route-stops-section"; then
              echo "✓ Pages project has latest build with route stops"
            else
              echo "⚠️  Pages project missing route stops"
            fi
          fi

          echo ""
          echo "Checking custom domain..."
          echo "Custom domain: $CUSTOM_DOMAIN"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$CUSTOM_DOMAIN")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Custom domain returned HTTP $STATUS (expected 200)"
            exit 1
          fi

          if curl -s "$CUSTOM_DOMAIN/TourDay_01" | grep -q "route-stops-section"; then
            echo "✅ Custom domain has latest content with route stops"
          else
            echo "❌ Custom domain is outdated - missing route stops"
            exit 1
          fi
