name: Rebuild Tour Site from Sheets

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'astro.config.mjs'
      - 'package.json'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Fetch and transform tour data from Sheets
        env:
          TOUR_SHEETS_ID: ${{ secrets.TOUR_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          TOUR_NAME: ${{ secrets.TOUR_NAME }}
          TOUR_SLUG: ${{ secrets.TOUR_SLUG }}
          TOUR_START_DATE: ${{ secrets.TOUR_START_DATE }}
          TOUR_END_DATE: ${{ secrets.TOUR_END_DATE }}
          TOUR_DESCRIPTION: ${{ secrets.TOUR_DESCRIPTION }}
          R2_BASE_URL: ${{ secrets.R2_BASE_URL }}
        run: npm run fetch

      - name: Validate route stops data quality
        run: npm run audit

      - name: Build site with Astro
        env:
          TOUR_NAME: ${{ secrets.TOUR_NAME }}
          TOUR_SLUG: ${{ secrets.TOUR_SLUG }}
          TOUR_START_DATE: ${{ secrets.TOUR_START_DATE }}
          TOUR_END_DATE: ${{ secrets.TOUR_END_DATE }}
          TOUR_DESCRIPTION: ${{ secrets.TOUR_DESCRIPTION }}
          R2_BASE_URL: ${{ secrets.R2_BASE_URL }}
        run: npm run build:astro

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
        run: |
          npm install -g wrangler
          wrangler pages deploy dist --project-name=$CLOUDFLARE_PROJECT_NAME --commit-dirty=true

      - name: Validate deployment
        run: |
          SITE_URL="https://${{ secrets.CLOUDFLARE_PROJECT_NAME }}.pages.dev"
          echo "Validating deployment at $SITE_URL..."

          # Check HTTP status
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SITE_URL")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Site returned HTTP $STATUS (expected 200)"
            exit 1
          fi
          echo "✓ HTTP status: 200"

          # Check site title contains expected tour name
          TITLE=$(curl -s "$SITE_URL" | grep -o '<title>[^<]*</title>' | sed 's/<[^>]*>//g')
          if [ -z "$TITLE" ]; then
            echo "❌ Could not find page title"
            exit 1
          fi
          echo "✓ Page title: $TITLE"

          # Verify tour metadata is present
          if ! curl -s "$SITE_URL" | grep -q "Canal des Deux Mers"; then
            echo "❌ Tour name not found in site content"
            exit 1
          fi
          echo "✓ Tour metadata verified"

          echo ""
          echo "✅ Deployment validation passed"
