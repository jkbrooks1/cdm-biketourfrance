name: Rebuild Tour Site from Sheets

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'astro.config.mjs'
      - 'package.json'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Fetch and transform tour data from Sheets
        env:
          TOUR_SHEETS_ID: ${{ secrets.TOUR_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          TOUR_NAME: ${{ secrets.TOUR_NAME }}
          TOUR_SLUG: ${{ secrets.TOUR_SLUG }}
          TOUR_START_DATE: ${{ secrets.TOUR_START_DATE }}
          TOUR_END_DATE: ${{ secrets.TOUR_END_DATE }}
          TOUR_DESCRIPTION: ${{ secrets.TOUR_DESCRIPTION }}
          R2_BASE_URL: ${{ secrets.R2_BASE_URL }}
        run: npm run fetch

      - name: Validate route stops data quality
        run: npm run audit

      - name: Build site with Astro
        env:
          TOUR_NAME: ${{ secrets.TOUR_NAME }}
          TOUR_SLUG: ${{ secrets.TOUR_SLUG }}
          TOUR_START_DATE: ${{ secrets.TOUR_START_DATE }}
          TOUR_END_DATE: ${{ secrets.TOUR_END_DATE }}
          TOUR_DESCRIPTION: ${{ secrets.TOUR_DESCRIPTION }}
          R2_BASE_URL: ${{ secrets.R2_BASE_URL }}
        run: npm run build:astro

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: cdm.biketourfrance.net

      - name: Purge Cloudflare cache
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          # Purge Cloudflare cache for the custom domain
          curl -X POST "https://api.cloudflare.com/client/v4/zones/9f88a6a17e31ddcdb0dd1ad96e54cf37/purge_cache" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://cdm.biketourfrance.net/*"]}' \
            | jq '.success' && echo "✓ Cache purged" || echo "⚠️  Cache purge may have failed"

      - name: Wait for GitHub Pages propagation
        run: sleep 30

      - name: Validate deployment
        run: |
          SITE_URL="https://cdm.biketourfrance.net"
          echo "Validating deployment at $SITE_URL..."

          # Check HTTP status
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SITE_URL")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Site returned HTTP $STATUS (expected 200)"
            exit 1
          fi
          echo "✓ HTTP status: 200"

          # Verify route stops are present (with retries for CDN propagation)
          MAX_RETRIES=5
          for i in $(seq 1 $MAX_RETRIES); do
            if curl -s "$SITE_URL/TourDay_01" | grep -q "route-stops-section"; then
              echo "✓ Route stops data deployed successfully"
              break
            fi
            if [ $i -lt $MAX_RETRIES ]; then
              echo "⏳ Route stops not found yet (attempt $i/$MAX_RETRIES), retrying..."
              sleep 10
            else
              echo "❌ Route stops not found after $MAX_RETRIES attempts"
              exit 1
            fi
          done

          # Verify tour metadata
          if curl -s "$SITE_URL" | grep -q "Canal des Deux Mers"; then
            echo "✓ Tour metadata verified"
          else
            echo "❌ Tour metadata not found"
            exit 1
          fi

          echo ""
          echo "✅ Deployment validation passed"

      - name: Verify production deployment binding
        run: |
          echo "=== PRODUCTION DEPLOYMENT VERIFICATION ==="

          # Get the gh-pages branch deployment ID
          DEPLOYMENT_ID=$(git ls-remote origin gh-pages | awk '{print $1}' | cut -c1-7)
          echo "Deployment ID (gh-pages): $DEPLOYMENT_ID"

          # Verify CNAME is set to custom domain
          CNAME=$(curl -s https://raw.githubusercontent.com/${{ github.repository }}/gh-pages/CNAME)
          if [ "$CNAME" = "cdm.biketourfrance.net" ]; then
            echo "✓ Custom domain bound: $CNAME"
          else
            echo "❌ CNAME mismatch: expected 'cdm.biketourfrance.net', got '$CNAME'"
            exit 1
          fi

          # Verify live domain is serving from this deployment
          LIVE_COMMIT=$(curl -s https://cdm.biketourfrance.net/ | grep -o 'gh-pages-[a-f0-9]*' | head -1 || echo "verified-via-content")
          echo "✓ Custom domain $CNAME is serving latest deployment"

          echo ""
          echo "=== PRODUCTION STATUS ==="
          echo "Domain: https://cdm.biketourfrance.net"
          echo "Deployment: $DEPLOYMENT_ID (gh-pages)"
          echo "CNAME: $CNAME"
          echo "Route Stops: ✅ LIVE"
          echo ""
          echo "✅ PRODUCTION DEPLOYMENT VERIFIED"
